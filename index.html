<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Medic</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; border-radius: 0 !important; user-select: none; touch-action: manipulation; }
        body, html { height: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; }
        .active { display: flex; }
        /* Кнопки */
        button { border: none; font-weight: 900; color: #fff; }
        .btn-main { flex: 1; font-size: 2.5rem; margin-bottom: 2px; }
        .red { background: #f00; } .yellow { background: #fc0; color: #000; } .green { background: #0f0; color: #000; }
        .blue { background: #07f; } .gray { background: #333; }
        /* Карта */
        .map { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #050505; }
        .img-box { position: relative; height: 90%; }
        .img-box img { height: 100%; width: auto; display: block; border: 1px solid #333; }
        .hit { position: absolute; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); }
        .h-head { top: 2%; left: 33%; width: 34%; height: 13%; }
        .h-tors { top: 15%; left: 25%; width: 50%; height: 35%; }
        .h-arm-l { top: 20%; left: 0%; width: 25%; height: 40%; }
        .h-arm-r { top: 20%; right: 0%; width: 25%; height: 40%; }
        .h-leg-l { bottom: 2%; left: 18%; width: 32%; height: 45%; }
        .h-leg-r { bottom: 2%; right: 18%; width: 32%; height: 45%; }
        /* Интерфейс */
        .header { background: #222; font-size: 2rem; text-align: center; padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; flex: 1; gap: 2px; }
        .opt { background: #222; font-size: 1.2rem; }
        .opt.sel { background: #fc0; color: #000; }
        .opt.on { background: #0f0; color: #000; }
        .nav { display: flex; height: 15%; }
        .nav-btn { flex: 1; font-size: 1.5rem; }
        .list { flex: 1; overflow-y: auto; padding: 5px; }
        .item { background: #111; padding: 20px; border-left: 15px solid #444; margin-bottom: 3px; font-size: 1.4rem; }
        .item.crit { border-left-color: #f00; }
        .massive { font-size: 3rem; font-weight: bold; text-align: center; margin: auto; }
    </style>
</head>
<body>
    <div id="scr-start" class="screen active">
        <button class="btn-main red" onclick="ui.show('scr-red')">КРАСНАЯ</button>
        <button class="btn-main yellow" onclick="ui.show('scr-yellow')">ЖЕЛТАЯ</button>
        <button class="btn-main green" onclick="ui.show('scr-start')">ЗЕЛЕНАЯ</button>
    </div>

    <div id="scr-red" class="screen red" style="justify-content:center">
        <div class="massive">ТОЛЬКО ТУРНИКЕТ!</div>
        <button class="nav-btn gray" style="height:20%" onclick="ui.show('scr-start')">ГОТОВО</button>
    </div>

    <div id="scr-yellow" class="screen">
        <div id="list-cont" class="list"></div>
        <div class="nav">
            <button class="nav-btn blue" onclick="ui.show('scr-map')">+ РАНЕНЫЙ</button>
            <button class="nav-btn gray" onclick="ui.show('scr-start')">НАЗАД</button>
        </div>
    </div>

    <div id="scr-map" class="screen">
        <div class="map"><div class="img-box">
            <img src="body.webp">
            <div class="hit h-head" onclick="app.set('Голова')"></div>
            <div class="hit h-tors" onclick="app.set('Торс')"></div>
            <div class="hit h-arm-l" onclick="app.set('Л. Рука')"></div>
            <div class="hit h-arm-r" onclick="app.set('П. Рука')"></div>
            <div class="hit h-leg-l" onclick="app.set('Л. Нога')"></div>
            <div class="hit h-leg-r" onclick="app.set('П. Нога')"></div>
        </div></div>
        <button class="nav-btn gray" style="height:10%" onclick="ui.show('scr-yellow')">ОТМЕНА</button>
    </div>

    <div id="scr-det" class="screen">
        <div class="header" id="det-title">ЗОНА</div>
        <div class="grid">
            <button class="opt" onclick="ui.sel(this,'type','Сильное')">СИЛЬНОЕ КРОВ.</button>
            <button class="opt" onclick="ui.sel(this,'type','Слабое')">СЛАБОЕ КРОВ.</button>
            <button class="opt" onclick="ui.sel(this,'type','Перелом')">ПЕРЕЛОМ</button>
            <button class="opt chk on" onclick="ui.tog(this,'breath')">ДЫШИТ</button>
            <button class="opt chk on" onclick="ui.tog(this,'pulse')">ПУЛЬС</button>
            <button class="opt chk on" onclick="ui.tog(this,'cons')">СОЗНАНИЕ</button>
        </div>
        <button class="nav-btn blue" style="height:20%" onclick="app.save()">СОХРАНИТЬ</button>
    </div>

    <script>
        const app = {
            data: { part: '', type: '', breath: true, pulse: true, cons: true },
            list: [],
            set(n) { this.data.part = n; document.getElementById('det-title').innerText = n.toUpperCase(); ui.show('scr-det'); },
            save() {
                if(!this.data.type) return alert("ВЫБЕРИ ТИП!");
                let c = (this.data.type === 'Сильное' || !this.data.breath || !this.data.pulse);
                if(c) ui.speak("Критический! Эвакуация!");
                this.list.push({...this.data, crit: c, time: new Date().toLocaleTimeString().slice(0,5)});
                this.data = { part: '', type: '', breath: true, pulse: true, cons: true };
                ui.render(); ui.show('scr-yellow');
            }
        };
        const ui = {
            show(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                if(id==='scr-det') { document.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel')); document.querySelectorAll('.chk').forEach(b=>b.classList.add('on')); }
                if(id==='scr-red') this.speak("Красная зона. Наложи турникет!");
            },
            sel(b,f,v) { b.parentElement.querySelectorAll('.opt:not(.chk)').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); app.data[f]=v; },
            tog(b,f) { app.data[f]=!app.data[f]; b.classList.toggle('on'); },
            speak(t) { const m = new SpeechSynthesisUtterance(t); m.lang = 'ru-RU'; window.speechSynthesis.speak(m); },
            render() { document.getElementById('list-cont').innerHTML = app.list.map(p => `<div class="item ${p.crit?'crit':''}"><b>${p.part}</b>: ${p.type}<br><small>${p.breath?'':'БЕЗ ДЫХ. '}${p.pulse?'':'БЕЗ ПУЛЬСА'} | ${p.time}</small></div>`).join(''); }
        };
    </script>
</body>
</html>
